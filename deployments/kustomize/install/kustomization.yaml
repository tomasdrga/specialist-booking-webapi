apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: specialist-booking-webapi-mongodb-init
    files:
      - params/init-db.js
  - name: specialist-booking-webapi-config
    literals:
      - database=specialist-booking
      - collection=clinics
patches:
  - path: patches/webapi.deployment.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: specialist-booking-webapi
